<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyATX5bxvJhV1U6iSYqQWjFNQu-ex0foVC4",
    authDomain: "ai-studio-applet-webapp-33020.firebaseapp.com",
    projectId: "ai-studio-applet-webapp-33020",
    storageBucket: "ai-studio-applet-webapp-33020.firebasestorage.app",
    messagingSenderId: "975550308330",
    appId: "1:975550308330:web:6298b9dee06f5d11331c93"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  db.collection("ebooks").get().then((querySnapshot) => {
    let booksDiv = document.getElementById("books");

    querySnapshot.forEach((doc) => {
      let data = doc.data();

      booksDiv.innerHTML += `
        <div style="border:1px solid black; padding:10px; margin:10px;">
          <h2>${data.title}</h2>
          <p>Author: ${data.Author}</p>
          <p>Price: ${data.Price}</p>
        </div>
      `;
    });
  }).catch((error) => {
    console.log("Error:", error);
  });
</script>
