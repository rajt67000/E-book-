<!DOCTYPE html>
<html>
<head>
  <title>Ebook App</title>
</head>

<body>

<h1>📚 My Ebook App</h1>
<div id="books"></div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  // ✅ YOUR EXACT FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCcUlfZRf2U4wuKN2sUEyOUwH0JqYRa7nI",
    authDomain: "ai-studio-applet-webapp-33020.firebaseapp.com",
    projectId: "ai-studio-applet-webapp-33020",
    storageBucket: "ai-studio-applet-webapp-33020.firebasestorage.app",
    messagingSenderId: "975550308330",
    appId: "1:975550308330:web:6298b9dee06f5d11331c93"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const booksDiv = document.getElementById("books");

  // Fetch data from Firestore
  db.collection("ebooks").get().then((snapshot) => {
    snapshot.forEach((doc) => {
      const data = doc.data();

      booksDiv.innerHTML += `
        <div style="border:1px solid black; padding:10px; margin:10px;">
          <h2>${data.title}</h2>
          <p>Author: ${data.Author}</p>
          <p>Price: ₹${data.Price}</p>
        </div>
      `;
    });
  });
</script>

</body>
</html>
