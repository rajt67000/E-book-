<!DOCTYPE html>
<html>
<head>
  <title>Ebook App</title>
</head>

<body>

<h1>My Ebook App</h1>
<div id="books"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCcUlfZRf2U4wuKN2sUEyOUwH0JqYRa7nI",
  authDomain: "ai-studio-applet-webapp-33020.firebaseapp.com",
  projectId: "ai-studio-applet-webapp-33020",
  storageBucket: "ai-studio-applet-webapp-33020.firebasestorage.app",
  messagingSenderId: "975550308330",
  appId: "1:975550308330:web:6298b9dee06f5d11331c93"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const booksDiv = document.getElementById("books");

async function loadBooks() {
  const querySnapshot = await getDocs(collection(db, "books"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    booksDiv.innerHTML += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        <h2>${data.title}</h2>
        <p>Author: ${data.author}</p>
        <p>Price: ${data.price}</p>
      </div>
    `;
  });
}

loadBooks();
</script>

</body>
</html>
