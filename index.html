<!DOCTYPE html>
<html>
<head>
  <title>Ebook App</title>
</head>

<body>

<h1>My Ebook App</h1>
<div id="books"></div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCcUlfZRf2U4wuKN2sUEyOUwH0JqYRa7nI",
  authDomain: "ai-studio-applet-webapp-33020.firebaseapp.com",
  projectId: "ai-studio-applet-webapp-33020",
  storageBucket: "ai-studio-applet-webapp-33020.appspot.com",
  messagingSenderId: "975550308330",
  appId: "1:975550308330:web:3115187893e87527331c93"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("ebooks").get().then((querySnapshot) => {
  let booksDiv = document.getElementById("books");

  querySnapshot.forEach((doc) => {
    let data = doc.data();

    booksDiv.innerHTML += `
      <div style="border:1px solid black; padding:10px; margin:10px;">
        <h2>${data.title}</h2>
        <p>Author: ${data.Author}</p>
        <p>Price: ${data.Price}</p>
      </div>
    `;
  });
});

</script>

</body>
</html>
